name: ShinsokuMobile
options:
  bundleIdPrefix: com.shinsoku
  deploymentTarget:
    iOS: "17.0"
targets:
  ShinsokuMobile:
    type: application
    platform: iOS
    sources:
      - path: App/Sources
      - path: Shared/Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shinsoku.mobile.ios
        PRODUCT_NAME: Shinsoku
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "0.1.0"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_CFBundleDisplayName: Shinsoku
        INFOPLIST_KEY_CFBundleURLTypes:
          - CFBundleURLName: com.shinsoku.mobile
            CFBundleURLSchemes:
              - shinsoku
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_NSMicrophoneUsageDescription: Shinsoku uses the microphone for voice input.
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: Shinsoku uses speech recognition to transcribe voice drafts.
        INFOPLIST_KEY_UIUserInterfaceStyle: Automatic
        SWIFT_VERSION: "5.10"
        GENERATE_INFOPLIST_FILE: "YES"
        SUPPORTS_MACCATALYST: "NO"
        CODE_SIGN_ENTITLEMENTS: App/ShinsokuMobile.entitlements
    dependencies:
      - target: ShinsokuKeyboard
      - sdk: Speech.framework
      - sdk: AVFoundation.framework
  ShinsokuKeyboard:
    type: app-extension
    platform: iOS
    sources:
      - path: Keyboard/Sources
      - path: Shared/Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shinsoku.mobile.ios.keyboard
        PRODUCT_NAME: ShinsokuKeyboard
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "0.1.0"
        GENERATE_INFOPLIST_FILE: "NO"
        INFOPLIST_FILE: Keyboard/Info.plist
        INFOPLIST_KEY_NSFullAccessUsageDescription: Shinsoku uses full access for network-backed voice input.
        INFOPLIST_KEY_UIUserInterfaceStyle: Automatic
        SWIFT_VERSION: "5.10"
        CODE_SIGN_ENTITLEMENTS: Keyboard/ShinsokuKeyboard.entitlements
