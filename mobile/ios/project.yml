name: ShinsokuMobile
options:
  bundleIdPrefix: com.shinsoku
  deploymentTarget:
    iOS: "16.0"
targets:
  ShinsokuMobile:
    type: application
    platform: iOS
    sources:
      - path: App/Sources
      - path: Shared/Sources
      - path: ../nativecore/src
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shinsoku.mobile.ios
        PRODUCT_NAME: Shinsoku
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "0.1.0"
        GENERATE_INFOPLIST_FILE: "NO"
        INFOPLIST_FILE: App/Info.plist
        SWIFT_VERSION: "5.10"
        SUPPORTS_MACCATALYST: "NO"
        CODE_SIGN_ENTITLEMENTS: App/ShinsokuMobile.entitlements
        SWIFT_OBJC_BRIDGING_HEADER: Shared/Sources/ShinsokuBridgingHeader.h
        HEADER_SEARCH_PATHS:
          - $(SRCROOT)/../nativecore/include
        CLANG_CXX_LANGUAGE_STANDARD: gnu++20
    dependencies:
      - target: ShinsokuKeyboard
      - sdk: Speech.framework
      - sdk: AVFoundation.framework
  ShinsokuKeyboard:
    type: app-extension
    platform: iOS
    sources:
      - path: Keyboard/Sources
      - path: App/Sources/SpeechTranscriber.swift
      - path: Shared/Sources
      - path: ../nativecore/src
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shinsoku.mobile.ios.keyboard
        PRODUCT_NAME: ShinsokuKeyboard
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "0.1.0"
        GENERATE_INFOPLIST_FILE: "NO"
        INFOPLIST_FILE: Keyboard/Info.plist
        INFOPLIST_KEY_NSFullAccessUsageDescription: Shinsoku uses full access for network-backed voice input.
        INFOPLIST_KEY_UIUserInterfaceStyle: Automatic
        SWIFT_VERSION: "5.10"
        CODE_SIGN_ENTITLEMENTS: Keyboard/ShinsokuKeyboard.entitlements
        SWIFT_OBJC_BRIDGING_HEADER: Shared/Sources/ShinsokuBridgingHeader.h
        HEADER_SEARCH_PATHS:
          - $(SRCROOT)/../nativecore/include
        CLANG_CXX_LANGUAGE_STANDARD: gnu++20
    dependencies:
      - sdk: Speech.framework
      - sdk: AVFoundation.framework
schemes:
  ShinsokuMobile:
    build:
      targets:
        ShinsokuMobile: all
        ShinsokuKeyboard: all
    run:
      config: Debug
    archive:
      config: Release
