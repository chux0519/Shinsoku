name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Existing git tag to build, for example v0.1.1-rc1"
        required: true
        type: string

permissions:
  contents: write

env:
  QT_VERSION: "6.10.2"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  macos_release:
    name: macOS Release
    runs-on:
      - self-hosted
      - macOS
      - ARM64
    env:
      RELEASE_REF_NAME: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.ref_name }}
      VCPKG_ROOT: ${{ vars.MACOS_VCPKG_ROOT }}
      SHINSOKU_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
      SHINSOKU_NOTARY_PROFILE: ${{ secrets.MACOS_NOTARY_PROFILE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.ref }}

      - name: Validate macOS release configuration
        shell: bash
        run: |
          set -euo pipefail
          [[ -n "${VCPKG_ROOT}" ]] || { echo "Set repository variable MACOS_VCPKG_ROOT."; exit 1; }
          [[ -d "${VCPKG_ROOT}" ]] || { echo "MACOS_VCPKG_ROOT does not exist: ${VCPKG_ROOT}"; exit 1; }
          [[ -n "${SHINSOKU_CODESIGN_IDENTITY}" ]] || { echo "Set repository secret MACOS_CODESIGN_IDENTITY."; exit 1; }
          [[ -n "${SHINSOKU_NOTARY_PROFILE}" ]] || { echo "Set repository secret MACOS_NOTARY_PROFILE."; exit 1; }

      - name: Configure
        shell: bash
        run: |
          cmake -S . -B build-release-macos -G "Ninja Multi-Config" \
            -DCMAKE_TOOLCHAIN_FILE="${VCPKG_ROOT}/scripts/buildsystems/vcpkg.cmake"

      - name: Build notarized DMG
        shell: bash
        run: |
          cmake --build build-release-macos --config Release --target package_macos_dmg

      - name: Collect macOS asset
        shell: bash
        run: |
          set -euo pipefail
          version="${RELEASE_REF_NAME#v}"
          mkdir -p dist
          dmg_path="$(find build-release-macos/packages -maxdepth 1 -name '*.dmg' | head -n 1)"
          [[ -n "${dmg_path}" ]] || { echo "No DMG produced."; exit 1; }
          cp "${dmg_path}" "dist/Shinsoku-${version}-macos-arm64.dmg"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v6
        with:
          name: macos-release
          path: dist/Shinsoku-*-macos-arm64.dmg
          if-no-files-found: error

  windows_release:
    name: Windows Release
    runs-on: windows-2022
    env:
      RELEASE_REF_NAME: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.ref_name }}
      VCPKG_BINARY_SOURCES: clear;files,${{ github.workspace }}\.cache\vcpkg-binary-cache,readwrite
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.ref }}

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          archives: qtbase qtsvg

      - name: Restore vcpkg binary cache
        uses: actions/cache@v5
        with:
          path: .cache/vcpkg-binary-cache
          key: windows-vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json', 'CMakeLists.txt') }}
          restore-keys: |
            windows-vcpkg-${{ runner.os }}-

      - name: Bootstrap vcpkg
        shell: pwsh
        run: |
          git clone --depth 1 https://github.com/microsoft/vcpkg "$env:RUNNER_TEMP\vcpkg"
          & "$env:RUNNER_TEMP\vcpkg\bootstrap-vcpkg.bat" -disableMetrics

      - name: Install non-Qt dependencies
        shell: pwsh
        run: |
          & "$env:RUNNER_TEMP\vcpkg\vcpkg.exe" install `
            curl ixwebsocket mbedtls miniaudio nlohmann-json sqlite3 `
            --classic `
            --triplet x64-windows `
            "--vcpkg-root=$env:RUNNER_TEMP\vcpkg" `
            "--x-install-root=$env:GITHUB_WORKSPACE\vcpkg_installed"

      - name: Configure
        shell: pwsh
        run: |
          cmake -S . -B build-release-windows -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="$env:RUNNER_TEMP\vcpkg\scripts\buildsystems\vcpkg.cmake" `
            -DVCPKG_MANIFEST_MODE=OFF `
            -DVCPKG_INSTALLED_DIR="$env:GITHUB_WORKSPACE\vcpkg_installed" `
            -DCMAKE_PREFIX_PATH="$env:QT_ROOT_DIR"

      - name: Build Windows portable package
        shell: pwsh
        run: |
          cmake --build build-release-windows --config Release --target package_windows_portable

      - name: Collect Windows asset
        shell: pwsh
        run: |
          $version = $env:RELEASE_REF_NAME.TrimStart('v')
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $zip = Get-ChildItem build-release-windows/packages -Filter *.zip | Select-Object -First 1
          if (-not $zip) {
            throw "No Windows package produced."
          }
          Copy-Item $zip.FullName "dist/Shinsoku-$version-windows-portable.zip" -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v6
        with:
          name: windows-release
          path: dist/Shinsoku-*-windows-portable.zip
          if-no-files-found: error

  linux_release:
    name: Linux Release
    runs-on:
      - self-hosted
      - Linux
      - X64
    env:
      LINUX_VCPKG_ROOT: ${{ vars.LINUX_VCPKG_ROOT }}
      RELEASE_REF_NAME: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.ref_name }}
      VCPKG_INSTALLED_DIR: ${{ github.workspace }}/vcpkg_installed
      VCPKG_DEFAULT_TRIPLET: x64-linux-dynamic
      VCPKG_HOST_TRIPLET: x64-linux
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.ref }}

      - name: Validate Linux runner environment
        run: |
          test -n "$LINUX_VCPKG_ROOT"
          test -x "$LINUX_VCPKG_ROOT/vcpkg"
          command -v cmake
          command -v ninja
          command -v rsvg-convert
          command -v wayland-scanner

      - name: Configure
        run: |
          "$LINUX_VCPKG_ROOT/vcpkg" install \
            curl ixwebsocket mbedtls miniaudio nlohmann-json qtbase qtsvg qtwayland sqlite3 \
            --classic \
            --triplet "$VCPKG_DEFAULT_TRIPLET" \
            --vcpkg-root="$LINUX_VCPKG_ROOT" \
            --x-install-root="$VCPKG_INSTALLED_DIR"
          cmake -S . -B build-release-linux -G "Ninja Multi-Config" \
            -DCMAKE_TOOLCHAIN_FILE="$LINUX_VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET="$VCPKG_DEFAULT_TRIPLET" \
            -DVCPKG_HOST_TRIPLET="$VCPKG_HOST_TRIPLET" \
            -DVCPKG_MANIFEST_MODE=OFF \
            -DVCPKG_INSTALLED_DIR="$VCPKG_INSTALLED_DIR"

      - name: Build Linux binary
        run: |
          cmake --build build-release-linux --config Release --target shinsoku

      - name: Download linuxdeploy
        run: |
          mkdir -p tools/linuxdeploy
          curl -L https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage -o tools/linuxdeploy/linuxdeploy-x86_64.AppImage
          chmod +x tools/linuxdeploy/linuxdeploy-x86_64.AppImage packaging/linux/package-appimage.sh

      - name: Build AppImage
        run: |
          version="${RELEASE_REF_NAME#v}"
          mkdir -p dist
          packaging/linux/package-appimage.sh \
            --app-name Shinsoku \
            --version "${version}" \
            --build-dir "$PWD/build-release-linux" \
            --config Release \
            --output-dir "$PWD/dist" \
            --linuxdeploy "$PWD/tools/linuxdeploy/linuxdeploy-x86_64.AppImage" \
            --desktop-template "$PWD/packaging/linux/shinsoku.desktop.in" \
            --icon-svg "$PWD/resources/icons/square-bolt.svg" \
            --triplet "$VCPKG_DEFAULT_TRIPLET" \
            --vcpkg-installed-dir "$VCPKG_INSTALLED_DIR"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v6
        with:
          name: linux-release
          path: dist/Shinsoku-*-linux-x86_64.AppImage
          if-no-files-found: error

  android_release:
    name: Android Release
    runs-on:
      - self-hosted
      - macOS
      - ARM64
    env:
      RELEASE_REF_NAME: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.ref_name }}
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.ref }}

      - name: Configure Java
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${JAVA_HOME:-}" && -d "/Applications/Android Studio.app/Contents/jbr/Contents/Home" ]]; then
            echo "JAVA_HOME=/Applications/Android Studio.app/Contents/jbr/Contents/Home" >> "$GITHUB_ENV"
            echo "/Applications/Android Studio.app/Contents/jbr/Contents/Home/bin" >> "$GITHUB_PATH"
          fi

      - name: Validate Android runner environment
        shell: bash
        run: |
          set -euo pipefail
          command -v java
          test -n "${ANDROID_HOME:-${ANDROID_SDK_ROOT:-}}" || { echo "Set ANDROID_HOME or ANDROID_SDK_ROOT on the runner."; exit 1; }
          android_sdk="${ANDROID_SDK_ROOT:-${ANDROID_HOME}}"
          test -d "${android_sdk}/build-tools" || { echo "Android build-tools not found under ${android_sdk}."; exit 1; }

      - name: Build APKs
        shell: bash
        working-directory: mobile/android
        run: |
          set -euo pipefail
          ./gradlew --no-daemon assembleDebug assembleRelease

      - name: Collect Android assets
        shell: bash
        run: |
          set -euo pipefail
          version="${RELEASE_REF_NAME#v}"
          mkdir -p dist
          cp mobile/android/app/build/outputs/apk/debug/app-debug.apk "dist/Shinsoku-${version}-android-debug.apk"

          unsigned_apk="mobile/android/app/build/outputs/apk/release/app-release-unsigned.apk"
          [[ -f "${unsigned_apk}" ]] || { echo "No unsigned release APK produced."; exit 1; }

          if [[ -n "${ANDROID_KEYSTORE_BASE64:-}" && -n "${ANDROID_KEYSTORE_PASSWORD:-}" && -n "${ANDROID_KEY_ALIAS:-}" ]]; then
            android_sdk="${ANDROID_SDK_ROOT:-${ANDROID_HOME}}"
            build_tools="$(find "${android_sdk}/build-tools" -mindepth 1 -maxdepth 1 -type d | sort | tail -n 1)"
            [[ -n "${build_tools}" ]] || { echo "No Android build-tools version found."; exit 1; }
            keystore="$RUNNER_TEMP/shinsoku-release.keystore"
            aligned_apk="dist/Shinsoku-${version}-android-release-aligned.apk"
            signed_apk="dist/Shinsoku-${version}-android-release.apk"
            printf '%s' "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > "${keystore}"
            "${build_tools}/zipalign" -f -p 4 "${unsigned_apk}" "${aligned_apk}"
            key_password="${ANDROID_KEY_PASSWORD:-${ANDROID_KEYSTORE_PASSWORD}}"
            "${build_tools}/apksigner" sign \
              --ks "${keystore}" \
              --ks-pass "pass:${ANDROID_KEYSTORE_PASSWORD}" \
              --ks-key-alias "${ANDROID_KEY_ALIAS}" \
              --key-pass "pass:${key_password}" \
              --out "${signed_apk}" \
              "${aligned_apk}"
            "${build_tools}/apksigner" verify --print-certs "${signed_apk}"
            rm -f "${aligned_apk}" "${keystore}"
          else
            cp "${unsigned_apk}" "dist/Shinsoku-${version}-android-release-unsigned.apk"
            echo "Android signing secrets are incomplete; uploaded unsigned release APK plus debug APK."
          fi

      - name: Upload Android artifact
        uses: actions/upload-artifact@v6
        with:
          name: android-release
          path: dist/Shinsoku-*-android-*.apk
          if-no-files-found: error

  publish_release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - macos_release
      - windows_release
      - linux_release
      - android_release
    env:
      RELEASE_REF_NAME: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.ref_name }}
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-assets

      - name: Flatten assets
        run: |
          mkdir -p upload
          find release-assets -type f \( -name '*.dmg' -o -name '*.zip' -o -name '*.AppImage' -o -name '*.apk' \) -exec cp {} upload/ \;
          ls -lah upload

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_REF_NAME }}
          files: upload/*
          draft: false
          generate_release_notes: true
