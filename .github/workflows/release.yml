name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Existing git tag to build, for example v0.1.1-rc1"
        required: true
        type: string

permissions:
  contents: write

env:
  QT_VERSION: "6.10.2"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  macos_release:
    name: macOS Release
    runs-on:
      - self-hosted
      - macOS
      - ARM64
    env:
      RELEASE_REF_NAME: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.ref_name }}
      VCPKG_ROOT: ${{ vars.MACOS_VCPKG_ROOT }}
      SHINSOKU_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
      SHINSOKU_NOTARY_PROFILE: ${{ secrets.MACOS_NOTARY_PROFILE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.ref }}

      - name: Validate macOS release configuration
        shell: bash
        run: |
          set -euo pipefail
          [[ -n "${VCPKG_ROOT}" ]] || { echo "Set repository variable MACOS_VCPKG_ROOT."; exit 1; }
          [[ -d "${VCPKG_ROOT}" ]] || { echo "MACOS_VCPKG_ROOT does not exist: ${VCPKG_ROOT}"; exit 1; }
          [[ -n "${SHINSOKU_CODESIGN_IDENTITY}" ]] || { echo "Set repository secret MACOS_CODESIGN_IDENTITY."; exit 1; }
          [[ -n "${SHINSOKU_NOTARY_PROFILE}" ]] || { echo "Set repository secret MACOS_NOTARY_PROFILE."; exit 1; }

      - name: Configure
        shell: bash
        run: |
          cmake -S . -B build-release-macos -G "Ninja Multi-Config" \
            -DCMAKE_TOOLCHAIN_FILE="${VCPKG_ROOT}/scripts/buildsystems/vcpkg.cmake"

      - name: Build notarized DMG
        shell: bash
        run: |
          cmake --build build-release-macos --config Release --target package_macos_dmg

      - name: Collect macOS asset
        shell: bash
        run: |
          set -euo pipefail
          version="${RELEASE_REF_NAME#v}"
          mkdir -p dist
          dmg_path="$(find build-release-macos/packages -maxdepth 1 -name '*.dmg' | head -n 1)"
          [[ -n "${dmg_path}" ]] || { echo "No DMG produced."; exit 1; }
          cp "${dmg_path}" "dist/Shinsoku-${version}-macos-arm64.dmg"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v6
        with:
          name: macos-release
          path: dist/Shinsoku-*-macos-arm64.dmg
          if-no-files-found: error

  windows_release:
    name: Windows Release
    runs-on: windows-2022
    env:
      RELEASE_REF_NAME: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.ref_name }}
      VCPKG_BINARY_SOURCES: clear;files,${{ github.workspace }}\.cache\vcpkg-binary-cache,readwrite
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.ref }}

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          archives: qtbase qtsvg

      - name: Restore vcpkg binary cache
        uses: actions/cache@v5
        with:
          path: .cache/vcpkg-binary-cache
          key: windows-vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json', 'CMakeLists.txt') }}
          restore-keys: |
            windows-vcpkg-${{ runner.os }}-

      - name: Bootstrap vcpkg
        shell: pwsh
        run: |
          git clone --depth 1 https://github.com/microsoft/vcpkg "$env:RUNNER_TEMP\vcpkg"
          & "$env:RUNNER_TEMP\vcpkg\bootstrap-vcpkg.bat" -disableMetrics

      - name: Install non-Qt dependencies
        shell: pwsh
        run: |
          & "$env:RUNNER_TEMP\vcpkg\vcpkg.exe" install `
            curl ixwebsocket mbedtls miniaudio nlohmann-json sqlite3 `
            --classic `
            --triplet x64-windows `
            "--vcpkg-root=$env:RUNNER_TEMP\vcpkg" `
            "--x-install-root=$env:GITHUB_WORKSPACE\vcpkg_installed"

      - name: Configure
        shell: pwsh
        run: |
          cmake -S . -B build-release-windows -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="$env:RUNNER_TEMP\vcpkg\scripts\buildsystems\vcpkg.cmake" `
            -DVCPKG_MANIFEST_MODE=OFF `
            -DVCPKG_INSTALLED_DIR="$env:GITHUB_WORKSPACE\vcpkg_installed" `
            -DCMAKE_PREFIX_PATH="$env:QT_ROOT_DIR"

      - name: Build Windows portable package
        shell: pwsh
        run: |
          cmake --build build-release-windows --config Release --target package_windows_portable

      - name: Collect Windows asset
        shell: pwsh
        run: |
          $version = $env:RELEASE_REF_NAME.TrimStart('v')
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $zip = Get-ChildItem build-release-windows/packages -Filter *.zip | Select-Object -First 1
          if (-not $zip) {
            throw "No Windows package produced."
          }
          Copy-Item $zip.FullName "dist/Shinsoku-$version-windows-portable.zip" -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v6
        with:
          name: windows-release
          path: dist/Shinsoku-*-windows-portable.zip
          if-no-files-found: error

  linux_release:
    name: Linux Release
    runs-on: ubuntu-24.04
    env:
      RELEASE_REF_NAME: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.ref_name }}
      VCPKG_BINARY_SOURCES: clear;files,${{ github.workspace }}/.cache/vcpkg-binary-cache,readwrite
      VCPKG_INSTALLED_DIR: ${{ github.workspace }}/vcpkg_installed
      VCPKG_DEFAULT_TRIPLET: x64-linux
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.ref }}

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            autoconf-archive \
            automake \
            build-essential \
            desktop-file-utils \
            gperf \
            libevdev-dev \
            libegl1-mesa-dev \
            libqt6svg6-dev \
            libtool \
            libfuse2 \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libpulse-dev \
            libwayland-dev \
            libx11-xcb-dev \
            libxcb-cursor-dev \
            libxcb-glx0-dev \
            libxcb-icccm4-dev \
            libxcb-image0-dev \
            libxcb-keysyms1-dev \
            libxcb-randr0-dev \
            libxcb-render-util0-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-shm0-dev \
            libxcb-sync-dev \
            libxcb-util-dev \
            libxcb-xfixes0-dev \
            libxcb-xinerama0-dev \
            libxcb-xinput-dev \
            libxcb-xkb-dev \
            libxcb1-dev \
            libxi-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libxkbcommon-x11-0 \
            libxrender-dev \
            ninja-build \
            patchelf \
            pkg-config \
            qt6-base-dev \
            qt6-base-dev-tools \
            qt6-base-private-dev \
            qt6-qpa-plugins \
            qt6-wayland \
            qt6-wayland-dev \
            qt6-wayland-dev-tools \
            qt6-wayland-private-dev \
            librsvg2-bin \
            wayland-protocols

      - name: Restore vcpkg binary cache
        uses: actions/cache@v5
        with:
          path: .cache/vcpkg-binary-cache
          key: linux-vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json', 'CMakeLists.txt') }}
          restore-keys: |
            linux-vcpkg-${{ runner.os }}-

      - name: Bootstrap vcpkg
        run: |
          git clone --depth 1 https://github.com/microsoft/vcpkg "$RUNNER_TEMP/vcpkg"
          "$RUNNER_TEMP/vcpkg/bootstrap-vcpkg.sh" -disableMetrics

      - name: Install non-Qt dependencies
        run: |
          "$RUNNER_TEMP/vcpkg/vcpkg" install \
            curl ixwebsocket mbedtls miniaudio nlohmann-json sqlite3 \
            --classic \
            --triplet "$VCPKG_DEFAULT_TRIPLET" \
            --vcpkg-root="$RUNNER_TEMP/vcpkg" \
            --x-install-root="$VCPKG_INSTALLED_DIR"

      - name: Configure
        run: |
          qt_cmake_bin="$(command -v qt-cmake-private || command -v qt-cmake || command -v cmake)"
          [[ -n "${qt_cmake_bin}" ]] || { echo "qt-cmake-private not found"; exit 1; }
          "${qt_cmake_bin}" -S . -B build-release-linux -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="$RUNNER_TEMP/vcpkg/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_MANIFEST_MODE=OFF \
            -DVCPKG_INSTALLED_DIR="$VCPKG_INSTALLED_DIR"

      - name: Build Linux binary
        run: |
          cmake --build build-release-linux --target shinsoku

      - name: Download linuxdeploy
        run: |
          mkdir -p tools/linuxdeploy
          curl -L https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage -o tools/linuxdeploy/linuxdeploy-x86_64.AppImage
          curl -L https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage -o tools/linuxdeploy/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x tools/linuxdeploy/linuxdeploy-x86_64.AppImage tools/linuxdeploy/linuxdeploy-plugin-qt-x86_64.AppImage packaging/linux/package-appimage.sh

      - name: Build AppImage
        run: |
          version="${RELEASE_REF_NAME#v}"
          qmake_bin="$(command -v qmake6 || command -v qmake)"
          [[ -n "${qmake_bin}" ]] || { echo "qmake6 not found"; exit 1; }
          mkdir -p dist
          packaging/linux/package-appimage.sh \
            --app-name Shinsoku \
            --version "${version}" \
            --executable "$PWD/build-release-linux/shinsoku" \
            --output-dir "$PWD/dist" \
            --linuxdeploy "$PWD/tools/linuxdeploy/linuxdeploy-x86_64.AppImage" \
            --linuxdeploy-plugin-qt "$PWD/tools/linuxdeploy/linuxdeploy-plugin-qt-x86_64.AppImage" \
            --desktop-template "$PWD/packaging/linux/shinsoku.desktop.in" \
            --icon-svg "$PWD/resources/icons/square-bolt.svg" \
            --qmake "${qmake_bin}" \
            --triplet "$VCPKG_DEFAULT_TRIPLET" \
            --vcpkg-installed-dir "$VCPKG_INSTALLED_DIR"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v6
        with:
          name: linux-release
          path: dist/Shinsoku-*-linux-x86_64.AppImage
          if-no-files-found: error

  publish_release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - macos_release
      - windows_release
      - linux_release
    env:
      RELEASE_REF_NAME: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.ref_name }}
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-assets

      - name: Flatten assets
        run: |
          mkdir -p upload
          find release-assets -type f \( -name '*.dmg' -o -name '*.zip' -o -name '*.AppImage' \) -exec cp {} upload/ \;
          ls -lah upload

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_REF_NAME }}
          files: upload/*
          draft: false
          generate_release_notes: true
